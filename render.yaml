services:
  - type: web
    name: whatsapp-fashion-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: FLASK_DEBUG
        value: "0"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
