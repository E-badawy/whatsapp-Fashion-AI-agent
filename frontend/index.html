<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WhatsApp Fashion Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">MVP Console</p>
        <h1>WhatsApp Fashion Agent</h1>
      </div>
      <div class="status" id="healthStatus">Checking API</div>
    </header>

    <main class="shell">
      <section class="panel catalog-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Products</p>
            <h2>Catalog</h2>
          </div>
          <button id="refreshProducts" type="button">Refresh</button>
        </div>

        <form id="productForm" class="form-grid">
          <label>
            SKU
            <input name="sku" placeholder="DRS-025" required />
          </label>
          <label>
            Name
            <input name="name" placeholder="Ruby Wrap Dress" required />
          </label>
          <label>
            Category
            <input name="category" placeholder="Dresses" required />
          </label>
          <label>
            Price
            <input name="price" type="number" placeholder="45000" required />
          </label>
          <label>
            Sizes
            <input name="sizes" placeholder="S, M, L" />
          </label>
          <label>
            Colors
            <input name="colors" placeholder="red, black" />
          </label>
          <label>
          Stock
          <input name="stock" type="number" placeholder="10" />
          </label>

        <label>
          Product Image
        <input
        id="productImage"
        type="file"
        accept="image/*">
        </label>

        <label class="wide">
        <img
        id="imagePreview"
        alt="Product Preview"
        style="
            display:none;
            max-width:220px;
            border-radius:8px;
          ">
          </label>
          <label class="wide">
            Description
            <textarea name="description" placeholder="Fit, fabric, occasion, styling notes"></textarea>
          </label>
          <div class="wide" style="display:flex;gap:10px;">
    <button
        id="productSubmit"
        class="primary"
        type="submit">
        Add Product
    </button>

    <button
        id="cancelEdit"
        type="button"
        style="display:none;">
        Cancel
    </button>
</div>
        </form>

        <div id="productList" class="list"></div>
      </section>

      <section class="panel chat-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Customer View</p>
            <h2>Chat Simulator</h2>
          </div>
        </div>

        <div id="chatLog" class="chat-log">
          <div class="bubble assistant">Welcome. Try: "How much is the dress from your story?"</div>
        </div>

        <form id="chatForm" class="chat-form">
          <input name="message" placeholder="Ask about a story item, size, price, or order..." autocomplete="off" />
          <button class="primary" type="submit">Send</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Human Handoff</p>
            <h2>Staff Inbox</h2>
          </div>
          <button id="refreshConversations" type="button">Refresh</button>
        </div>

        <div id="conversationList" class="list"></div>
        <div id="conversationDetail" class="conversation-detail"></div>

        <form id="manualReplyForm" class="chat-form">
          <input name="message" placeholder="Manual reply to selected customer..." autocomplete="off" />
          <button class="primary" type="submit">Reply</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Stories</p>
            <h2>Story Items</h2>
          </div>
        </div>

        <form id="storyForm" class="form-grid compact">
          <label>
            Title
            <input name="title" placeholder="Today Look 2" required />
          </label>
          <label>
            Product SKU
            <input name="product_sku" placeholder="DRS-001" />
          </label>
          <label class="wide">
            Caption
            <textarea name="caption" placeholder="Caption from WhatsApp status or Instagram story"></textarea>
          </label>
          <button class="primary wide" type="submit">Add Story Item</button>
        </form>

        <div id="storyList" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Sales</p>
            <h2>Orders</h2>
          </div>
          <button id="refreshOrders" type="button">Refresh</button>
        </div>
        <div id="orderList" class="list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
